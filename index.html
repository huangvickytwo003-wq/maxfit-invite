<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAXFIT Invitation</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
}

.container {
  position: relative;
  max-width: 1200px;
}

.container img {
  width: 100%;
  display: block;
}

/* 共用點擊區 */
.link {
  position: absolute;
  cursor: pointer;
}

/* MAP */
.map {
  top: 90%;
  left: 16%;
  width: 22%;
  height: 7%;
}

/* BOOTH */
.booth {
  top: 90%;
  left: 42%;
  width: 28%;
  height: 7%;
}

/* hover（讓使用者知道可點） */
.link:hover {
  background: rgba(255,255,255,0.15);
}
</style>

</head>

<body>

<div class="container">
  <img src="FIBO.jpg">

  <!-- MAP -->
  <a href="https://www.fibo.com/germany/en-gb/visit/venue-and-travel.html" target="_blank" class="link map"></a>

  <!-- BOOTH -->
  <a href="https://www.fibo.com/germany/en-gb/visit/Hallplan.html" target="_blank" class="link booth"></a>

</div>

</body>
</html>
