<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAXFIT Invitation</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
}

/* 主容器（固定比例，關鍵） */
.container {
  position: relative;
  width: 100%;
  max-width: 1200px;
  aspect-ratio: 1200 / 630; /* ⚠️ 依你的圖片比例 */
  background: #000;
}

/* 主圖（不裁切、不超出） */
.container img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: contain; /* ✅ 關鍵：完整顯示 */
}

/* 點擊區 */
.link {
  position: absolute;
  cursor: pointer;
}

/* MAP */
.map {
  top: 84%;
  left: 14%;
  width: 22%;
  height: 8%;
}

/* BOOTH */
.booth {
  top: 84%;
  left: 40%;
  width: 28%;
  height: 8%;
}

/* hover效果（可選） */
.link:hover {
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
}

/* 手機版優化 */
@media (max-width: 768px) {

  .container {
    aspect-ratio: 1200 / 700; /* 手機稍微調整比例 */
  }

  .map {
    top: 86%;
    left: 10%;
    width: 35%;
    height: 10%;
  }

  .booth {
    top: 86%;
    left: 50%;
    width: 40%;
    height: 10%;
  }
}
</style>

</head>

<body>

<div class="container">
  <img src="FIBO.jpg">

  <!-- MAP -->
  <a href="https://www.fibo.com/germany/en-gb/visit/venue-and-travel.html" target="_blank" class="link map"></a>

  <!-- BOOTH -->
  <a href="https://www.fibo.com/germany/en-gb/visit/Hallplan.html" target="_blank" class="link booth"></a>

</div>

</body>
</html>
