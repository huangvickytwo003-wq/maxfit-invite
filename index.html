<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAXFIT Invitation</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
}

/* 容器 = 圖片本身（關鍵，不再錯位） */
.container {
  position: relative;
  width: 100%;
  max-width: 1200px;
}

/* 主圖（不裁切、不變形） */
.container img {
  width: 100%;
  display: block;
}

/* 點擊區 */
.link {
  position: absolute;
  cursor: pointer;
}

/* MAP 按鈕 */
.map {
  top: 84%;
  left: 13%;
  width: 24%;
  height: 9%;
}

/* BOOTH 按鈕 */
.booth {
  top: 84%;
  left: 40%;
  width: 30%;
  height: 9%;
}

/* hover效果（讓使用者知道可點） */
.link:hover {
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
}

/* 手機版優化 */
@media (max-width: 768px) {

  .map {
    top: 86%;
    left: 8%;
    width: 38%;
    height: 10%;
  }

  .booth {
    top: 86%;
    left: 50%;
    width: 40%;
    height: 10%;
  }
}
</style>

</head>

<body>

<div class="container">
  <img src="FIBO.jpg">

  <!-- FIBO MAP -->
  <a href="https://www.fibo.com/germany/en-gb/visit/venue-and-travel.html"
     target="_blank"
     class="link map"></a>

  <!-- BOOTH LOCATION -->
  <a href="https://www.fibo.com/germany/en-gb/visit/Hallplan.html"
     target="_blank"
     class="link booth"></a>

</div>

</body>
</html>
