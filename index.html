<!DOCTYPE html>
<html>
<head>

<title>MAXFIT Invitation</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
}

.container {
  position: relative;
  max-width: 1200px;
}

.container img {
  width: 100%;
  display: block;
}

/* 共用 */
.link {
  position: absolute;
  top: 83%;
  height: 8%;
}

/* MAP（左） */
.map {
  left: 18%;
  width: 22%;
}

/* BOOTH（右） */
.booth {
  left: 44%;
  width: 28%;
}

/* hover效果（品牌感） */
.link:hover {
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
  <img src="FIBO.jpg">

  <!-- MAP -->
  <a href="https://www.fibo.com/germany/en-gb/visit/venue-and-travel.html" target="_blank" class="link map"></a>

  <!-- BOOTH -->
  <a href="https://www.fibo.com/germany/en-gb/visit/Hallplan.html" target="_blank" class="link booth"></a>

</div>

</html>
