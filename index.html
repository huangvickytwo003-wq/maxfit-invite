<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAXFIT Invitation</title>

<style>
body {
  margin: 0;
  background: #000;
  display: flex;
  justify-content: center;
}

.container {
  position: relative;
  max-width: 1200px;
}

.container img {
  width: 100%;
  display: block;
}

/* 點擊區（測試可見） */
.link {
  position: absolute;
  top: 80%;
  height: 9%;
  background: rgba(255, 0, 0, 0.3); /* 🔴 測試用 */
}

/* MAP */
.map {
  left: 12%;
  width: 22%;
}

/* BOOTH */
.booth {
  left: 38%;
  width: 28%;
}

.link:hover {
  background: rgba(0,255,0,0.4);
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
  <img src="FIBO.jpg">

  <!-- MAP -->
  <a href="https://www.fibo.com/germany/en-gb/visit/venue-and-travel.html" target="_blank" class="link map"></a>

  <!-- BOOTH -->
  <a href="https://www.fibo.com/germany/en-gb/visit/Hallplan.html" target="_blank" class="link booth"></a>

</div>

</body>
</html>
